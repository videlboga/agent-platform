name: PR Review

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML
        run: |
          python3 -m pip install --quiet yamllint
          yamllint .

      - name: Validate docker-compose
        run: |
          python3 -c "
          import yaml, sys
          with open('docker-compose.yml') as f:
              cfg = yaml.safe_load(f)
          assert 'services' in cfg, 'Missing services key'
          assert 'postgres' in cfg['services'], 'Missing postgres service'
          assert 'redis' in cfg['services'], 'Missing redis service'
          print('docker-compose.yml: valid')
          "

  markdown:
    name: markdown-link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        run: |
          python3 -m pip install --quiet markdown-link-check 2>/dev/null || true
          for f in docs/*.md README.md; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            grep -oP '\[([^\]]+)\]\(([^)]+)\)' "$f" | while read -r link; do
              echo "  $link"
            done
          done
